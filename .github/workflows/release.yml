name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: mac
            artifact_path: |
              dist/*.dmg
              dist/*.zip
              dist/latest-mac.yml
              dist/*.blockmap
          - os: windows-latest
            target: win
            artifact_path: |
              dist/*.exe
              dist/latest.yml
              dist/*.blockmap
          - os: ubuntu-latest
            target: linux
            artifact_path: |
              dist/*.AppImage
              dist/latest-linux.yml
              dist/*.blockmap
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Platform evidence
        run: node -p "process.platform + '-' + process.arch"
      - run: npm ci
      # APPIMAGE_EXTRACT_AND_RUN lets electron-builder's bundled appimagetool
      # run without libfuse2 (absent on the runners); a no-op on mac/win.
      - name: Build macOS DMG (ad-hoc signed)
        if: matrix.target == 'mac'
        run: npm run icons && npx electron-builder --mac dmg --arm64 --publish never -c.mac.identity=-
      - name: Build Windows EXE
        if: matrix.target == 'win'
        run: npm run dist:win
      - name: Build Linux AppImage
        if: matrix.target == 'linux'
        run: npm run dist:linux
        env:
          APPIMAGE_EXTRACT_AND_RUN: '1'
      - name: Verify updater artifact names
        run: npm run verify:release-artifact-names
      - uses: actions/upload-artifact@v4
        with:
          name: token-monitor-${{ matrix.target }}
          if-no-files-found: error
          path: ${{ matrix.artifact_path }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.dmg
            artifacts/*.zip
            artifacts/*.exe
            artifacts/*.AppImage
            artifacts/latest.yml
            artifacts/latest-mac.yml
            artifacts/latest-linux.yml
            artifacts/*.blockmap
          body_path: .github/RELEASE_TEMPLATE.md
