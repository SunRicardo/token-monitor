name: Fork Release

on:
  push:
    tags: ['*-fork-*']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: mac
            arch: arm64
            artifact: dist/*.dmg
          - os: windows-latest
            target: win
            arch: x64
            artifact: dist/*.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run icons
      - run: npx electron-builder --${{ matrix.target }} --${{ matrix.arch }} --publish never --config.mac.forceCodeSigning=false
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - uses: actions/upload-artifact@v4
        with:
          name: token-monitor-${{ matrix.target }}
          if-no-files-found: error
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate release body from upstream template
        run: |
          # Extract version from tag (e.g. 0.27.0-fork-f94bece -> 0.27.0)
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG%%-fork-*}"
          # Replace upstream repo URLs with fork repo URLs, and update version
          sed -e "s|Javis603/token-monitor|SunRicardo/token-monitor|g" \
              -e "s|download/v[0-9.]*/|download/${TAG}/|g" \
              -e "s|releases/download/v[0-9.]*/|releases/download/${TAG}/|g" \
              .github/RELEASE_TEMPLATE.md > release-body.md
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.dmg
            artifacts/*.exe
          body_path: release-body.md
